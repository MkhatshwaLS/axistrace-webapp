  services:

    mysql:
      image: mysql:8
      container_name: axistrace-mysql
      restart: always
      environment:
        MYSQL_ROOT_PASSWORD: rootpassword
        MYSQL_DATABASE: axistrace_db
      ports:
        - "3306:3306"
      volumes:
        - mysql_data:/var/lib/mysql

    backend:
      build:
        context: ./backend/AxisTrace.Api
      container_name: axistrace-api
      ports:
        - "5000:8080"
      environment:
        - ASPNETCORE_ENVIRONMENT=Development
        - ConnectionStrings__DefaultConnection=Server=mysql;Port=3306;Database=axistrace_db;User=root;Password=rootpassword;
      depends_on:
        - mysql

    frontend:
      build:
        context: ./frontend/axistrace-client
      container_name: axistrace-client
      ports:
        - "5173:5173"
      volumes:
        - ./frontend/axistrace-client:/app
        - /app/node_modules
      depends_on:
        - backend

  volumes:
    mysql_data:

